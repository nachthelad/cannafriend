version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    # Menos PRs abiertos a la vez: revisas en bloques y no se acumulan
    open-pull-requests-limit: 5
    reviewers:
      - "nachthelad"
    assignees:
      - "nachthelad"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
    labels:
      - "dependencies"
      - "automated"
    # Un solo grupo minor+patch → 1 PR por semana; majors en otro PR
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"

    # Evitar PRs que suelen romper CI; los actualizas cuando quieras
    ignore:
      - dependency-name: "node"
        versions: [">= 21"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      # Stripe major suele tener breaking changes; actualizar manualmente
      - dependency-name: "stripe"
        update-types: ["version-update:semver-major"]

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday" 
      time: "06:00"
      timezone: "UTC"
    reviewers:
      - "nachthelad"
    assignees:
      - "nachthelad"
    commit-message:
      prefix: "ci"
    labels:
      - "ci/cd"
      - "automated"